<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 240" preserveAspectRatio="none">

    <!-- ================= Back Wave Effects ================= -->

    <defs>
        <linearGradient id="backWaveGradient" x1="0%" y1="0%" x2="100%" y2="0%">

            <stop offset="0%" stop-color="#6C63FF" stop-opacity="0"></stop>

            <stop offset="25%" stop-color="#885CE6" stop-opacity="0.75"></stop>

            <stop offset="55%" stop-color="#A78BFA" stop-opacity="0.9"></stop>

            <stop offset="80%" stop-color="#3B82F6" stop-opacity="0.7"></stop>

            <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"></stop>

        </linearGradient>

        <filter id="backWaveGlow" x="-20%" y="-80%" width="140%" height="260%">

            <feGaussianBlur stdDeviation="7" result="blur"></feGaussianBlur>

            <feMerge>
                <feMergeNode in="blur"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>

        </filter>
    </defs>

    <!-- ================= Back Wave Area ================= -->

    <path d="
            M0 205
            C170 180, 280 130, 445 145
            C610 160, 700 205, 875 185
            C1045 165, 1165 105, 1310 125
            C1360 132, 1405 145, 1440 158
            L1440 240
            L0 240
            Z
        " fill="#6C63FF" fill-opacity="0.08"></path>

    <!-- ================= Back Wave Line ================= -->

    <path d="
            M0 205
            C170 180, 280 130, 445 145
            C610 160, 700 205, 875 185
            C1045 165, 1165 105, 1310 125
            C1360 132, 1405 145, 1440 158
        " fill="none" stroke="url(#backWaveGradient)" stroke-width="3" stroke-linecap="round" filter="url(#backWaveGlow)"></path>

</svg>